spring:
  application:
    name: smart-backend
  datasource:
    url: jdbc:mysql://localhost:3306/smart_backend?useSSL=false&serverTimezone=UTC
    username: root
    password: ${MYSQL_DEV_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    database: 0

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:smartYbackendYjwtYsecretYkeyYstringY2024Yv1}
  expire: ${JWT_EXPIRE:86400000}

upload:
  path: ${user.dir}/uploads/

logging:
  level:
    com.example.smartbackend: debug

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
