spring:
  application:
    name: smart-backend
  datasource:
    url: jdbc:mysql://mysql:3306/smart_backend?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: redis
    port: 6379
    password: ${REDIS_PASSWORD}
    database: 0

server:
  port: 8080
  forward-headers-strategy: native

jwt:
  secret: ${JWT_SECRET}
  expire: ${JWT_EXPIRE:86400000}

upload:
  path: ${user.dir}/uploads/

logging:
  level:
    com.example.smartbackend: debug

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
